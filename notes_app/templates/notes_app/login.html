{% extends 'notes_app/base.html' %}
{% block title %}Login — IN16{% endblock %}

{% block auth_content %}
<div class="card shadow-lg border-0">
  <div class="card-body p-4 p-md-5">

    <!-- Header -->
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
           style="width:60px;height:60px;
                  background:linear-gradient(135deg,var(--in16-accent),var(--in16-success));">
        <i class="bi bi-book-half text-white fs-4"></i>
      </div>

      <h4 class="fw-bold mb-0">IN16 Study Manager</h4>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    {% if form.errors %}
    <div class="alert py-2"
         style="background:rgba(220,38,38,.1);color:#b91c1c;border:none;">
      Invalid username or password.
    </div>
    {% endif %}

    <!-- Form -->
    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-500">Username</label>
        <div class="input-group">
          <span class="input-group-text"
                style="background:var(--in16-primary);border:none;">
            <i class="bi bi-person" style="color:var(--in16-dark);"></i>
          </span>
          <input type="text" name="username"
                 class="form-control"
                 placeholder="Your username"
                 required autofocus />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-500">Password</label>
        <div class="input-group">
          <span class="input-group-text"
                style="background:var(--in16-primary);border:none;">
            <i class="bi bi-lock" style="color:var(--in16-dark);"></i>
          </span>
          <input type="password" name="password"
                 class="form-control"
                 placeholder="Your password"
                 required />
        </div>
      </div>

      <!-- Button -->
      <button type="submit"
              class="btn w-100 fw-600"
              style="background:linear-gradient(135deg,var(--in16-accent),var(--in16-success));
                     color:white;border:none;padding:.65rem;">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Sign In
      </button>
    </form>

    <!-- Footer -->
    <div class="text-center mt-3">
      <span class="text-muted small">New student? </span>
      <a href="{% url 'register' %}"
         class="small fw-600"
         style="color:var(--in16-accent);">
        Create account
      </a>
    </div>

  </div>
</div>
{% endblock %}
